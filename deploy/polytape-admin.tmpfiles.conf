# Persistent spool: the unprivileged polytape-admin sidecar writes control intents
# here and the root polytape-control.path/helper reads + removes them. Created via
# tmpfiles (not the admin unit's RuntimeDirectory=) so it survives admin restarts and
# does not race the .path watcher. 0700 owner polytape-admin => the recorder user
# 'polytape' cannot forge an intent.
d /run/polytape-admin        0700 polytape-admin polytape-admin -
d /run/polytape-admin/intent 0700 polytape-admin polytape-admin -
# Shared restart lock (root): serializes the control helper against polytape-refresh.sh.
f /run/polytape-control.lock 0644 root root -
# Download/extract scratch on the BIG run volume (/data), not the small root fs that
# PrivateTmp's /tmp lands on — a whole-run-sized filtered copy overflowed root (ENOSPC).
# Owned polytape:polytape, NOT root and NOT polytape-admin: /data is owned by the recorder
# user 'polytape', and systemd-tmpfiles refuses an "unsafe path transition" when it creates
# a dir under /data owned by a DIFFERENT user — so the whole chain stays 'polytape'. The
# sidecar (User=polytape-admin, SupplementaryGroups=polytape) writes via that group, so the
# leaf is group-writable + setgid (2770). The recorder already holds the raw data this
# scratch slices, so sharing the 'polytape' group exposes nothing new. Granted RW in
# polytape-admin.service (ReadWritePaths); must exist before it starts. Parent declared
# explicitly so it, too, is polytape-owned (a root-owned /data/tmp re-triggers the warning).
d /data/tmp                0755 polytape polytape -
d /data/tmp/polytape-admin 2770 polytape polytape -
