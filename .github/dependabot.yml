version: 2
updates:
  # Keep the GitHub Actions used in CI current (security patches + maintenance).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Keep Python dependencies current — including the pinned `ruff`, so formatter/
  # linter bumps arrive as reviewable PRs that must pass CI before merging.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
