name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same branch / PR so a green check always
# reflects the latest commit rather than a stale one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: ruff check (lint)
        run: ruff check --output-format=github .
      - name: ruff format (style)
        run: ruff format --check --diff .

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      # Don't abort the whole matrix on the first failure — we want to see which
      # Python versions break, not just the earliest one.
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package + dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: pytest
        run: pytest -q

  # Single aggregated gate. Branch protection requires only this one context, so
  # the matrix above can grow or shrink without anyone touching repo settings.
  ci-success:
    name: CI success
    if: always()
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          echo "lint: ${{ needs.lint.result }}"
          echo "test: ${{ needs.test.result }}"
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::One or more required CI jobs did not succeed."
            exit 1
          fi
          echo "All required CI jobs passed."
